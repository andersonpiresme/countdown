<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@400;500;600;700;800&family=Archivo:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Archivo', sans-serif;
    background: #000000;
    color: #ffffff;
  }

  .banner {
    width: 100%;
    height: 100vh;
    min-height: 480px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000000;
  }

  /* Geometric pattern overlay inspired by Horse brand pattern */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(79,33,255,0.08) 0%, transparent 50%),
      linear-gradient(225deg, rgba(255,49,39,0.06) 0%, transparent 50%);
    z-index: 1;
  }

  /* Animated diagonal lines pattern */
  .pattern-overlay {
    position: absolute;
    inset: 0;
    z-index: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 40px,
        #ffffff 40px,
        #ffffff 41px
      );
  }

  /* Accent glow - top left */
  .glow-blue {
    position: absolute;
    top: -120px;
    left: -120px;
    width: 450px;
    height: 450px;
    background: radial-gradient(circle, rgba(79,33,255,0.18) 0%, transparent 65%);
    z-index: 1;
  }

  /* Accent glow - bottom right */
  .glow-red {
    position: absolute;
    bottom: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255,49,39,0.12) 0%, transparent 65%);
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 960px;
    padding: 0 24px;
  }

  /* Logo */
  .logo-container {
    margin-bottom: 32px;
  }

  .logo-container img {
    height: 52px;
    width: auto;
    filter: invert(1); /* The logo is black, invert to white */
  }

  /* Thin accent line under logo */
  .accent-line {
    width: 64px;
    height: 2px;
    background: linear-gradient(90deg, #4F21FF, #FF3127);
    margin-bottom: 28px;
    border-radius: 1px;
  }

  /* Program label */
  .program-label {
    font-family: 'Archivo Expanded', 'Archivo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #B2B2B2;
    margin-bottom: 10px;
  }

  /* Main title */
  .main-title {
    font-family: 'Archivo Expanded', 'Archivo', sans-serif;
    font-size: 42px;
    font-weight: 800;
    text-align: center;
    letter-spacing: 2px;
    line-height: 1.15;
    margin-bottom: 40px;
  }

  .main-title .highlight-red {
    color: #FF3127;
  }

  .main-title .highlight-blue {
    color: #4F21FF;
  }

  /* Countdown grid */
  .countdown-grid {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .countdown-unit {
    text-align: center;
    min-width: 120px;
  }

  .countdown-value-container {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px 12px 16px;
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  .countdown-unit:hover .countdown-value-container {
    border-color: rgba(79,33,255,0.3);
    background: rgba(79,33,255,0.04);
  }

  .countdown-value {
    font-family: 'Archivo Expanded', 'Archivo', sans-serif;
    font-size: 56px;
    font-weight: 800;
    line-height: 1;
    color: #ffffff;
    font-variant-numeric: tabular-nums;
  }

  .countdown-label {
    font-family: 'Archivo', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 12px;
  }

  .separator {
    font-size: 36px;
    font-weight: 300;
    color: rgba(255,255,255,0.15);
    padding-bottom: 26px;
    user-select: none;
  }

  /* Target date bar */
  .target-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 40px;
    padding: 10px 28px;
  }

  .target-bar-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #FF3127;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .target-bar-text {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
  }

  .target-bar-text strong {
    color: rgba(255,255,255,0.8);
    font-weight: 700;
  }

  /* Urgency animation when < 30 days */
  @keyframes urgent-flash {
    0%, 100% { color: #ffffff; }
    50% { color: #FF3127; }
  }

  .urgent .countdown-unit:first-child .countdown-value {
    animation: urgent-flash 1.8s ease-in-out infinite;
  }

  .urgent .countdown-unit:first-child .countdown-value-container {
    border-color: rgba(255,49,39,0.25);
  }

  /* Bottom bar */
  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #4F21FF 0%, #FF3127 50%, #FFF39F 100%);
    z-index: 3;
  }

  /* Completed state */
  .completed .main-title .highlight-red {
    color: #4caf50;
  }

  .completed .countdown-value {
    color: #4caf50 !important;
  }

  .completed .target-bar-dot {
    background: #4caf50;
    animation: none;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .main-title { font-size: 26px; }
    .countdown-grid { gap: 6px; }
    .countdown-unit { min-width: 72px; }
    .countdown-value { font-size: 36px; }
    .countdown-value-container { padding: 14px 8px 12px; border-radius: 8px; }
    .countdown-label { font-size: 8px; letter-spacing: 2px; }
    .separator { font-size: 24px; padding-bottom: 18px; }
    .logo-container img { height: 36px; }
    .program-label { font-size: 10px; letter-spacing: 3px; }
    .target-bar { padding: 8px 18px; }
    .target-bar-text { font-size: 11px; }
  }

  @media (max-width: 420px) {
    .main-title { font-size: 20px; letter-spacing: 1px; }
    .countdown-value { font-size: 28px; }
    .countdown-unit { min-width: 60px; }
    .program-label { font-size: 8px; }
  }
</style>
</head>
<body>

<div class="banner" id="banner">
  <div class="pattern-overlay"></div>
  <div class="glow-blue"></div>
  <div class="glow-red"></div>

  <div class="content">
    <div class="logo-container">
      <img src="https://horse-powertrain.com/hubfs/HORSE_LOGOTYPE_RGB_BLACK_WEB-01.svg" alt="Horse Powertrain" onerror="this.style.display='none'">
    </div>

    <div class="accent-line"></div>

    <div class="program-label">SAP S/4HANA Latin America</div>

    <h1 class="main-title">
      Countdown to <span class="highlight-red">Go Live</span>
    </h1>

    <div class="countdown-grid" id="countdownGrid">
      <div class="countdown-unit">
        <div class="countdown-value-container">
          <div class="countdown-value" id="days">--</div>
        </div>
        <div class="countdown-label">Dias</div>
      </div>
      <div class="separator">:</div>
      <div class="countdown-unit">
        <div class="countdown-value-container">
          <div class="countdown-value" id="hours">--</div>
        </div>
        <div class="countdown-label">Horas</div>
      </div>
      <div class="separator">:</div>
      <div class="countdown-unit">
        <div class="countdown-value-container">
          <div class="countdown-value" id="minutes">--</div>
        </div>
        <div class="countdown-label">Minutos</div>
      </div>
      <div class="separator">:</div>
      <div class="countdown-unit">
        <div class="countdown-value-container">
          <div class="countdown-value" id="seconds">--</div>
        </div>
        <div class="countdown-label">Segundos</div>
      </div>
    </div>

    <div class="target-bar">
      <div class="target-bar-dot"></div>
      <div class="target-bar-text">Target: <strong>05 de Julho de 2026</strong></div>
    </div>
  </div>

  <div class="bottom-strip"></div>
</div>

<script>
(function() {
  var targetDate = new Date('2026-07-05T23:59:00Z').getTime();

  function pad(n) {
    return n < 10 ? '0' + n : String(n);
  }

  function update() {
    var now = new Date().getTime();
    var diff = targetDate - now;
    var banner = document.getElementById('banner');

    if (diff <= 0) {
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      banner.classList.add('completed');
      return;
    }

    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('days').textContent = pad(days);
    document.getElementById('hours').textContent = pad(hours);
    document.getElementById('minutes').textContent = pad(minutes);
    document.getElementById('seconds').textContent = pad(seconds);

    if (days < 30) {
      banner.classList.add('urgent');
    } else {
      banner.classList.remove('urgent');
    }

    requestAnimationFrame(function() {
      setTimeout(update, 1000);
    });
  }

  update();
})();
</script>

</body>
</html>
